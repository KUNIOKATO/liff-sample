
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>相談フォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>相談フォーム</h2>

<!-- 入力フォーム -->
<p>内容</p>
<input type="text" id="msg" placeholder="内容を入力してください">

<br><br>

<button onclick="testUser()">userId確認</button>
<button onclick="send()">送信</button>

<script>
const LIFF_ID = "2010027289-dBxhMjuU";

// 初期化
async function initLIFF() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }
}

initLIFF();

// ユーザー取得
async function getUser() {
  const profile = await liff.getProfile();
  return {
    userId: profile.userId,
    displayName: profile.displayName
  };
}

// 確認ボタン
async function testUser() {
  const user = await getUser();
  alert("userId: " + user.userId + "\n名前: " + user.displayName);
}

// 送信処理
async function send() {

  const user = await getUser();

  let data = {
    userId: user.userId,
    userName: user.displayName,
    message: document.getElementById("msg").value
  };

  console.log("送信データ", data);

  // ★ここを書き換える★
  const url = "https://prod-04.japanwest.logic.azure.com:443/workflows/1b49670a2a464edfaf11f50ced94d5b7/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=-vfQp12wiWUF-OrAQm38Y_7MXIAY963B2P3Em_eUodA";
  await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("送信完了");
}
</script>

</body>
</html>
